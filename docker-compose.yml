services:
  mongodb:
    image: mongo:6
    container_name: moneymap-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongo_data:/data/db
    restart: always

  backend:
    build: ./backend
    container_name: moneymap-backend
    ports:
      - "8000:8000"
    env_file:
      - backend/.env.development   # 👈 HERE
    depends_on:
      - mongodb
    restart: always

  frontend:
    build: ./frontend
    container_name: moneymap-frontend
    ports:
      - "3000:5173"
    restart: always

volumes:
  mongo_data:

